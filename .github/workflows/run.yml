name: Market Scraper

on:
  schedule:
    - cron: "0 6 * * *"   # joka päivä klo 06 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - run: pip install requests

      - run: python scrape_market.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add . || true
          git diff --cached --quiet || git commit -m "Daily market update"
          git push
